<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gastón Ocampos Propiedades</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#f5f7fb}

/* HEADER */
.header{background:#0f2747;color:#fff}
.container{width:92%;margin:auto}
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 0}
.brand{display:flex;align-items:center;gap:10px;font-weight:800}
.brand-badge{border:2px solid #c89a3d;padding:8px;border-radius:10px;color:#c89a3d}
.menu{display:flex;gap:10px;align-items:center}
.menu a,.menu button{color:white;border:0;background:none;font-weight:700}
.btn-wa{background:#43b35b;padding:10px 15px;border-radius:8px}
.btn-admin{background:#c89a3d;padding:10px 15px;border-radius:8px}

/* HERO */
.hero{background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1600&q=80')center/cover;height:500px;color:white;display:flex;align-items:center}
.hero h1{font-size:60px}
.hero p{font-size:22px}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:30px}
.card{background:white;border-radius:15px;overflow:hidden}
.card img{height:200px;object-fit:cover}
.card-body{padding:15px}
.price{color:#c89a3d;font-size:22px;font-weight:900}
.btn{padding:10px;border-radius:8px;border:0;cursor:pointer}
.btn-primary{background:#0f2747;color:white}
.btn-secondary{background:#eee}
.btn-map{background:#d93025;color:white}

/* MOBILE FIX */
@media(max-width:640px){
.nav{flex-direction:column;gap:10px}
.menu{flex-wrap:wrap;justify-content:center}
.hero{height:350px;padding:20px}
.hero h1{font-size:32px}
.cards{grid-template-columns:1fr}
}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:white;width:90%;padding:20px;border-radius:15px}
.main-image{width:100%;height:250px;object-fit:cover}
.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px}
.thumbs img{height:70px;object-fit:cover;cursor:pointer}
</style>
</head>

<body>

<header class="header">
<div class="container nav">
<div class="brand">
<div class="brand-badge">GO</div>
Gastón Ocampos
</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Propiedades</a>
<a href="#">Contacto</a>
<a class="btn-wa" id="wa">WhatsApp</a>
<button class="btn-admin" onclick="openAdmin()">Admin</button>
</div>
</div>
</header>

<section class="hero">
<div class="container">
<h1>ENCONTRÁ TU PROPIEDAD</h1>
<p>Venta y alquiler en Salta</p>
</div>
</section>

<section class="container">
<h2>Propiedades</h2>
<div id="grid" class="cards"></div>
</section>

<!-- ADMIN -->
<section id="admin" style="display:none" class="container">
<h2>Admin</h2>

<input id="title" placeholder="Titulo">
<input id="price" placeholder="Precio">
<input id="location" placeholder="Ubicación">
<input id="maps" placeholder="Link Google Maps">
<textarea id="desc" placeholder="Descripción"></textarea>
<input type="file" id="images" multiple>

<button onclick="save()">Guardar</button>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<img id="mainImg" class="main-image">
<div id="thumbs" class="thumbs"></div>

<h2 id="dTitle"></h2>
<p id="dPrice"></p>
<p id="dDesc"></p>

<a id="mapBtn" class="btn btn-map" target="_blank">Ver ubicación</a>
</div>
</div>

<script>
const sb = supabase.createClient(
"https://vhsdmmlnurztnwojerhj.supabase.co",
"sb_publishable_kQXiGwL85wJUhmInsTJHdQ_ogPgsWLF"
);

const WA="5493870000000";
document.getElementById("wa").href=`https://wa.me/${WA}`;

async function load(){
const {data}=await sb.from("properties").select("*");

let html="";
for(let p of data){

const imgs=await sb.from("property_images").select("*").eq("property_id",p.id);

const img=imgs.data?.[0]?.image_url || "";

html+=`
<div class="card">
<img src="${img}">
<div class="card-body">
<h3>${p.title}</h3>
<div class="price">${p.price}</div>
<p>${p.location}</p>

<button class="btn btn-secondary" onclick="detail(${p.id})">Ver</button>
<a class="btn btn-map" href="${p.maps_url}" target="_blank">Mapa</a>
</div>
</div>`;
}

document.getElementById("grid").innerHTML=html;
}

async function detail(id){
const {data:p}=await sb.from("properties").select("*").eq("id",id).single();
const imgs=await sb.from("property_images").select("*").eq("property_id",id);

document.getElementById("modal").classList.add("show");

document.getElementById("dTitle").innerText=p.title;
document.getElementById("dPrice").innerText=p.price;
document.getElementById("dDesc").innerText=p.description;

document.getElementById("mapBtn").href=p.maps_url;

document.getElementById("mainImg").src=imgs.data[0].image_url;

document.getElementById("thumbs").innerHTML=
imgs.data.map(i=>`<img src="${i.image_url}" onclick="change('${i.image_url}')">`).join("");
}

function change(src){
document.getElementById("mainImg").src=src;
}

function openAdmin(){
document.getElementById("admin").style.display="block";
}

async function save(){
const title=document.getElementById("title").value;
const price=document.getElementById("price").value;
const location=document.getElementById("location").value;
const desc=document.getElementById("desc").value;
const maps=document.getElementById("maps").value;
const files=document.getElementById("images").files;

const {data:p}=await sb.from("properties").insert({
title,price,location,description:desc,maps_url:maps
}).select().single();

for(let i=0;i<files.length;i++){
const f=files[i];
const name=`${p.id}/${Date.now()}-${i}`;

await sb.storage.from("properties").upload(name,f);

const url=sb.storage.from("properties").getPublicUrl(name).data.publicUrl;

await sb.from("property_images").insert({
property_id:p.id,
image_url:url,
storage_path:name
});
}

load();
}

load();
</script>

</body>
</html>
